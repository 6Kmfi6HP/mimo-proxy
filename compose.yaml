services:
  mimo-proxy:
    image: ${MIMO_PROXY_IMAGE:-ghcr.io/6kmfi6hp/mimo-proxy:latest}
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      PORT: "5000"
      MIMO_BASE_URL: ${MIMO_BASE_URL:-}
      MIMO_SOCKS5: ${MIMO_SOCKS5:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
